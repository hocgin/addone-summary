<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>进度展示预览 - WebLLM-X</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #f3f4f6;
      padding: 20px;
    }

    .preview-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(360px, 1fr));
      gap: 20px;
      max-width: 1200px;
      width: 100%;
    }

    .preview-card {
      background: white;
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    .card-title {
      font-size: 14px;
      font-weight: 600;
      color: #6b7280;
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .loading-view {
      padding: 16px;
      text-align: center;
    }

    .spinner {
      width: 48px;
      height: 48px;
      border: 4px solid #e5e7eb;
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 24px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-title {
      font-size: 20px;
      font-weight: 700;
      color: #1f2937;
      margin: 0 0 8px;
    }

    .loading-message {
      font-size: 14px;
      color: #6b7280;
      margin: 0 0 8px;
    }

    .loading-stage {
      font-size: 12px;
      color: #9ca3af;
      margin: 0 0 24px;
      font-weight: 500;
    }

    .progress-container {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .progress-bar {
      flex: 1;
      height: 8px;
      background: #e5e7eb;
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #6366f1 0%, #8b5cf6 100%);
      border-radius: 4px;
      transition: width 0.3s ease;
    }

    .progress-text {
      font-size: 14px;
      font-weight: 600;
      color: #6366f1;
      min-width: 40px;
    }

    .progress-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 24px;
      padding: 16px;
      background: #f9fafb;
      border-radius: 8px;
    }

    .detail-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .detail-label {
      font-size: 11px;
      color: #9ca3af;
      font-weight: 500;
    }

    .detail-value {
      font-size: 13px;
      color: #374151;
      font-weight: 600;
    }

    .loading-steps {
      display: flex;
      justify-content: space-around;
    }

    .step {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      opacity: 0.4;
      transition: opacity 0.3s;
    }

    .step.active {
      opacity: 1;
    }

    .step-icon {
      font-size: 24px;
    }

    .step-text {
      font-size: 12px;
      color: #6b7280;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="preview-container">
    <!-- 场景 1: 早期初始化 -->
    <div class="preview-card">
      <div class="card-title">场景 1: 早期初始化 (5%)</div>
      <div class="loading-view">
        <div class="spinner"></div>
        <h2 class="loading-title">AI 正在分析中</h2>
        <p class="loading-message">加载模型中... 5%</p>
        <p class="loading-stage">初始化环境</p>

        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" style="width: 5%"></div>
          </div>
          <span class="progress-text">5%</span>
        </div>

        <div class="loading-steps">
          <div class="step active">
            <span class="step-icon">⚙️</span>
            <span class="step-text">初始化模型</span>
          </div>
          <div class="step">
            <span class="step-icon">📄</span>
            <span class="step-text">提取内容</span>
          </div>
          <div class="step">
            <span class="step-icon">🤖</span>
            <span class="step-text">生成摘要</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 场景 2: 下载中 -->
    <div class="preview-card">
      <div class="card-title">场景 2: 下载模型文件 (45%)</div>
      <div class="loading-view">
        <div class="spinner"></div>
        <h2 class="loading-title">AI 正在分析中</h2>
        <p class="loading-message">加载模型中... 45%</p>
        <p class="loading-stage">下载模型文件</p>

        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" style="width: 45%"></div>
          </div>
          <span class="progress-text">45%</span>
        </div>

        <div class="progress-details">
          <div class="detail-item">
            <span class="detail-label">已下载</span>
            <span class="detail-value">450 MB / 1000 MB</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">下载速度</span>
            <span class="detail-value">2.3 MB/s</span>
          </div>
          <div class="detail-item">
            <span class="detail-label">剩余时间</span>
            <span class="detail-value">240 秒</span>
          </div>
        </div>

        <div class="loading-steps">
          <div class="step active">
            <span class="step-icon">⚙️</span>
            <span class="step-text">初始化模型</span>
          </div>
          <div class="step">
            <span class="step-icon">📄</span>
            <span class="step-text">提取内容</span>
          </div>
          <div class="step">
            <span class="step-icon">🤖</span>
            <span class="step-text">生成摘要</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 场景 3: 生成摘要 -->
    <div class="preview-card">
      <div class="card-title">场景 3: 生成摘要 (75%)</div>
      <div class="loading-view">
        <div class="spinner"></div>
        <h2 class="loading-title">AI 正在分析中</h2>
        <p class="loading-message">生成摘要中...</p>
        <p class="loading-stage">生成摘要</p>

        <div class="progress-container">
          <div class="progress-bar">
            <div class="progress-fill" style="width: 75%"></div>
          </div>
          <span class="progress-text">75%</span>
        </div>

        <div class="loading-steps">
          <div class="step active">
            <span class="step-icon">⚙️</span>
            <span class="step-text">初始化模型</span>
          </div>
          <div class="step active">
            <span class="step-icon">📄</span>
            <span class="step-text">提取内容</span>
          </div>
          <div class="step active">
            <span class="step-icon">🤖</span>
            <span class="step-text">生成摘要</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
