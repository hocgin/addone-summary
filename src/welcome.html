<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>欢迎使用 WebLLM-X</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .welcome-container {
      background: white;
      border-radius: 20px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      max-width: 600px;
      width: 100%;
      overflow: hidden;
    }

    .header {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      padding: 40px 30px;
      text-align: center;
      color: white;
    }

    .logo {
      font-size: 64px;
      margin-bottom: 16px;
    }

    .header h1 {
      font-size: 28px;
      font-weight: 700;
      margin: 0 0 8px;
    }

    .header p {
      font-size: 16px;
      opacity: 0.9;
      margin: 0;
    }

    .content {
      padding: 40px 30px;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 40px;
    }

    .feature {
      text-align: center;
    }

    .feature-icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .feature-title {
      font-size: 14px;
      font-weight: 600;
      color: #1f2937;
      margin-bottom: 4px;
    }

    .feature-desc {
      font-size: 12px;
      color: #6b7280;
    }

    .steps {
      margin-bottom: 40px;
    }

    .steps-title {
      font-size: 18px;
      font-weight: 700;
      color: #1f2937;
      margin-bottom: 20px;
      text-align: center;
    }

    .step {
      display: flex;
      align-items: start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .step-number {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .step-content h3 {
      font-size: 16px;
      font-weight: 600;
      color: #1f2937;
      margin: 0 0 4px;
    }

    .step-content p {
      font-size: 14px;
      color: #6b7280;
      margin: 0;
    }

    .actions {
      display: flex;
      gap: 12px;
    }

    .btn {
      flex: 1;
      padding: 16px 24px;
      font-size: 16px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 100%);
      color: white;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px rgba(99, 102, 241, 0.3);
    }

    .btn-secondary {
      background: #f3f4f6;
      color: #6b7280;
    }

    .btn-secondary:hover {
      background: #e5e7eb;
    }

    .footer {
      padding: 20px 30px;
      background: #f9fafb;
      text-align: center;
      font-size: 12px;
      color: #9ca3af;
    }

    @media (max-width: 600px) {
      .features {
        grid-template-columns: 1fr;
      }

      .actions {
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="welcome-container">
    <div class="header">
      <div class="logo">🤖</div>
      <h1>欢迎使用 WebLLM-X</h1>
      <p>本地 AI 网页内容总结工具</p>
    </div>

    <div class="content">
      <div class="features">
        <div class="feature">
          <div class="feature-icon">🔒</div>
          <div class="feature-title">本地处理</div>
          <div class="feature-desc">数据不上传</div>
        </div>
        <div class="feature">
          <div class="feature-icon">⚡</div>
          <div class="feature-title">智能提取</div>
          <div class="feature-desc">一键总结</div>
        </div>
        <div class="feature">
          <div class="feature-icon">🎯</div>
          <div class="feature-title">结构化</div>
          <div class="feature-desc">清晰易读</div>
        </div>
      </div>

      <div class="steps">
        <div class="steps-title">快速开始</div>

        <div class="step">
          <div class="step-number">1</div>
          <div class="step-content">
            <h3>点击扩展图标</h3>
            <p>在 Chrome 工具栏中找到 WebLLM-X 图标</p>
          </div>
        </div>

        <div class="step">
          <div class="step-number">2</div>
          <div class="step-content">
            <h3>完成初始化设置</h3>
            <p>首次使用需要下载 AI 模型（约 1GB）</p>
          </div>
        </div>

        <div class="step">
          <div class="step-number">3</div>
          <div class="step-content">
            <h3>开始使用</h3>
            <p>浏览网页时点击图标即可获取 AI 摘要</p>
          </div>
        </div>
      </div>

      <div class="actions">
        <button class="btn btn-primary" onclick="openExtension()">
          打开扩展设置
        </button>
        <button class="btn btn-secondary" onclick="closeTab()">
          稍后再说
        </button>
      </div>
    </div>

    <div class="footer">
      WebLLM-X v0.1.0 • 使用本地 AI，保护您的隐私
    </div>
  </div>

  <script>
    function openExtension() {
      // 直接打开 onboarding 页面
      chrome.tabs.create({
        url: chrome.runtime.getURL('src/onboarding.html'),
        active: true
      }, () => {
        // 关闭欢迎页面
        window.close()
      })
    }

    function closeTab() {
      window.close()
    }

    // 页面加载完成后自动打开扩展设置
    window.addEventListener('load', () => {
      setTimeout(() => {
        openExtension()
      }, 1000)
    })
  </script>
</body>
</html>
