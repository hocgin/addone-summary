<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebLLM Offscreen</title>
  <style>
    body {
      margin: 0;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
    }
    .status {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
    h2 {
      margin: 0 0 10px 0;
      font-size: 18px;
      color: #333;
    }
    .info {
      color: #666;
      font-size: 14px;
      line-height: 1.6;
    }
    .log-container {
      margin-top: 20px;
      padding: 15px;
      background: #f8f8f8;
      border-radius: 4px;
      font-family: monospace;
      font-size: 12px;
      max-height: 400px;
      overflow-y: auto;
    }
    .log-item {
      margin: 5px 0;
      padding: 5px;
      border-left: 3px solid #ddd;
      padding-left: 10px;
    }
    .log-item.info {
      border-left-color: #2196F3;
      color: #1976D2;
    }
    .log-item.error {
      border-left-color: #f44336;
      background: #ffebee;
      color: #c62828;
    }
    .log-item.success {
      border-left-color: #4CAF50;
      color: #388E3C;
    }
  </style>
</head>
<body>
  <div class="status">
    <h2>WebLLM 运行环境</h2>
    <p class="info">AI 模型正在此页面加载和运行。请勿关闭此窗口。</p>
    <div class="log-container" id="log-container">
      <div class="log-item info">Offscreen 文档已加载，等待初始化...</div>
    </div>
  </div>
  <script type="module" src="./offscreen.ts"></script>
</body>
</html>
