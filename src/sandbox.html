<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebLLM Sandbox</title>
  <style>
    body {
      margin: 0;
      padding: 10px;
      font-family: monospace;
      font-size: 12px;
      background: #f5f5f5;
    }
    #log {
      background: white;
      padding: 10px;
      border-radius: 4px;
      max-height: 300px;
      overflow-y: auto;
    }
    .log-item {
      margin: 2px 0;
      padding: 2px 5px;
      border-left: 2px solid #ddd;
    }
    .log-item.info { border-left-color: #2196F3; }
    .log-item.error { border-left-color: #f44336; background: #ffebee; }
    .log-item.success { border-left-color: #4CAF50; }
  </style>
</head>
<body>
  <div id="log"></div>
  <script type="module" src="./sandbox.ts"></script>
</body>
</html>
